<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grace is reconnecting...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(to bottom, #0f172a, #1e293b, #0f172a);
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 2rem;
      text-align: center;
    }
    .heart {
      width: 80px;
      height: 80px;
      margin-bottom: 2rem;
      animation: pulse 2s ease-in-out infinite;
    }
    .heart svg {
      width: 100%;
      height: 100%;
      fill: #2dd4bf;
      opacity: 0.8;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.1); opacity: 1; }
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
      color: #2dd4bf;
    }
    p {
      color: #94a3b8;
      max-width: 300px;
      line-height: 1.6;
      margin-bottom: 1rem;
    }
    .dots {
      display: flex;
      gap: 0.5rem;
      margin-top: 1rem;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #2dd4bf;
      animation: blink 1.4s infinite both;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; }
      40% { opacity: 1; }
    }
    button {
      margin-top: 2rem;
      padding: 0.75rem 2rem;
      background: #2dd4bf;
      color: #0f172a;
      border: none;
      border-radius: 0.5rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #14b8a6; }
  </style>
</head>
<body>
  <div class="heart">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
    </svg>
  </div>
  <h1>Grace is reconnecting...</h1>
  <p>It looks like you're offline right now. Don't worry — Grace will be right back as soon as your connection returns.</p>
  <p style="font-style: italic; color: #5eead4;">"I'm still here. I'm always here."</p>
  <div class="dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
  <button onclick="window.location.reload()">Try Again</button>
</body>
</html>
